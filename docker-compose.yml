# FortuneTab 서비스 스택
# NAS에서 실행: docker compose up -d
services:
  pdf-server:
    build:
      context: .
      dockerfile: Dockerfile.pdf-server
    container_name: fortunetab-pdf-server
    ports:
      - "4001:4001"
    volumes:
      - ./pdf-server/output:/app/output
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - TOSS_PAYPAL_SECRET_KEY=${TOSS_PAYPAL_SECRET_KEY}
      - REPORT_RENDER_SECRET=${REPORT_RENDER_SECRET}
      - PDF_SERVER_HOST=0.0.0.0
      - PDF_SERVER_PORT=4001
    restart: unless-stopped
    networks:
      - fortunetab

networks:
  fortunetab:
    external: true
    name: n8n-docker_n8n_network  # 실제 n8n 네트워크 이름 (2026-04-22 확인)
