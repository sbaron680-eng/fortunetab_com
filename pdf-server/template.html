<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>FortuneTab PDF Generator</title>
  <!-- jspdf는 bundle.js에 포함됨 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body>
<div id="status">Ready</div>
<script src="bundle.js"></script>
<script>
  window.generateAndReturnPDF = async function(opts) {
    document.getElementById('status').textContent = 'Generating...';

    try {
      // 폰트 로드 대기
      await document.fonts.ready;

      // 사주 계산 (bundle.js에서 제공)
      let sajuData = null;
      if (opts.birthDate && typeof FortunePDF !== 'undefined' && FortunePDF.calculateSaju) {
        sajuData = FortunePDF.calculateSaju(opts.birthDate, opts.birthTime, opts.birthGender);
      }

      // PDF 생성 (returnBlob 모드)
      const blob = await FortunePDF.generatePlannerPDF({
        orientation: opts.orientation || 'portrait',
        year: opts.year || 2026,
        name: opts.name || '',
        pages: ['cover', 'year-index', 'monthly', 'weekly', 'daily'],
        theme: opts.theme || 'navy',
        mode: opts.mode || 'fortune',
        saju: sajuData,
        returnBlob: true,
      });

      // Blob → base64
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64 = reader.result.toString().split(',')[1];
          document.getElementById('status').textContent = 'Done';
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    } catch (err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
      throw err;
    }
  };
</script>
</body>
</html>
